<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Mission Control</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="OpenClaw navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M9 4.5a3.2 3.2 0 0 0-3.2 3.2v.5A3.8 3.8 0 0 0 4 11.5c0 1.2.5 2.3 1.3 3A3.6 3.6 0 0 0 9 19h1V4.5H9Z"></path><path d="M15 4.5a3.2 3.2 0 0 1 3.2 3.2v.5A3.8 3.8 0 0 1 20 11.5c0 1.2-.5 2.3-1.3 3A3.6 3.6 0 0 1 15 19h-1V4.5h1Z"></path><path d="M10 8H8.5"></path><path d="M14 8h1.5"></path><path d="M10 12H7.8"></path><path d="M14 12h2.2"></path><path d="M10 16H8.7"></path><path d="M14 16h1.3"></path></svg>
          </div>
          <strong>Mission Control</strong>
        </div>

        <nav class="main-nav" aria-label="Primary">
          <button class="nav-item active" type="button" data-view="tasks">
            <svg viewBox="0 0 24 24"><path d="M5 5h14v14H5z"></path><path d="M8 9h8"></path><path d="M8 13h6"></path></svg>
            Tasks
          </button>
          <button class="nav-item" type="button" data-view="approvals">
            <svg viewBox="0 0 24 24"><path d="M9 11l2 2 4-5"></path><path d="M5 4h14v16H5z"></path></svg>
            Approvals
          </button>
          <button class="nav-item" type="button" data-view="projects">
            <svg viewBox="0 0 24 24"><path d="M3 7h7l2 2h9v10H3z"></path></svg>
            Projects
          </button>
          <button class="nav-item" type="button" data-view="calendar">
            <svg viewBox="0 0 24 24"><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M4 9h16"></path><path d="M5 5h14v16H5z"></path></svg>
            Calendar
          </button>
          <button class="nav-item" type="button" data-view="memory">
            <svg viewBox="0 0 24 24"><path d="M6 5a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v14l-6-3-6 3z"></path><path d="M9 7h6"></path><path d="M9 11h4"></path></svg>
            Memory
          </button>
          <button class="nav-item" type="button" data-view="agents">
            <svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"></circle><circle cx="16" cy="16" r="3"></circle><path d="M10.5 10.5 13.5 13.5"></path><path d="M16 7v3"></path><path d="M14.5 8.5h3"></path></svg>
            Agents
          </button>
          <button class="nav-item" type="button" data-view="templates">
            <svg viewBox="0 0 24 24"><path d="M7 4h10l2 3v13H5V7z"></path><path d="M9 11h6"></path><path d="M9 15h4"></path></svg>
            Templates
          </button>
          <button class="nav-item" type="button" data-view="integrations">
            <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.1 0l1.4-1.4a5 5 0 0 0-7.1-7.1L10.5 5.4"></path><path d="M14 11a5 5 0 0 0-7.1 0l-1.4 1.4a5 5 0 0 0 7.1 7.1l.9-.9"></path></svg>
            Integrations
          </button>
          <button class="nav-item" type="button" data-view="settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1-2 2-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5v.2h-3v-.2a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1-2-2 .1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H5v-3h.2a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8L6.3 8l2-2 .1.1a1.7 1.7 0 0 0 1.8.3 1.7 1.7 0 0 0 1-1.5V4.7h3v.2a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1 2 2-.1.1a1.7 1.7 0 0 0-.3 1.8 1.7 1.7 0 0 0 1.5 1h.2v3h-.2a1.7 1.7 0 0 0-1.5 1Z"></path></svg>
            Settings
          </button>
        </nav>

        <section class="agent-sidebar">
          <div class="section-title">
            <span>OpenClaw Agents</span>
            <button class="icon-button" type="button" aria-label="Add agent">+</button>
          </div>
          <div id="agentList" class="agent-list"></div>
          <button class="add-agent" type="button">+ Add Agent</button>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1 id="pageTitle">Tasks</h1>
          <label class="search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
            <input id="searchInput" type="search" placeholder="Search tasks, agents, commands...">
            <kbd>Ctrl K</kbd>
          </label>
          <div class="top-actions">
            <button class="bell" type="button" aria-label="Notifications">
              <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="M10 21h4"></path></svg>
              <span></span>
            </button>
            <div class="notifications-panel" id="notificationsPanel" hidden></div>
            <button class="avatar-button" id="userAvatarButton" type="button" title="Change avatar initials">CC</button>
            <button class="chevron" type="button" aria-label="Account menu">
              <svg viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"></path></svg>
            </button>
          </div>
        </header>

        <section class="content" id="appContent">
          <div class="board-area">
            <div class="board-toolbar">
              <button class="create-button" id="newMissionButton" type="button">
                Create Task
                <span></span>
                <svg viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"></path></svg>
              </button>
              <div class="filter-actions">
                <button class="tool-button" type="button">
                  <svg viewBox="0 0 24 24"><path d="M4 5h16l-6 7v5l-4 2v-7z"></path></svg>
                  All Tasks
                  <svg viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"></path></svg>
                </button>
                <button class="tool-button" type="button">
                  <svg viewBox="0 0 24 24"><path d="M4 7h16"></path><path d="M7 12h10"></path><path d="M10 17h4"></path></svg>
                  Sort: Priority
                  <svg viewBox="0 0 24 24"><path d="m7 10 5 5 5-5"></path></svg>
                </button>
              </div>
            </div>

            <div class="mission-board" id="board"></div>

            <section class="event-console">
              <div class="console-tabs">
                <button class="active" type="button">Event Console</button>
                <button type="button">Agent Status</button>
                <button type="button">System Health</button>
                <div class="console-tools">
                  <button type="button">Pause</button>
                  <button type="button">Clear</button>
                  <button type="button">Filter</button>
                </div>
              </div>
              <div id="eventRows" class="event-rows"></div>
            </section>
          </div>

          <aside class="detail-panel" id="detailPanel"></aside>
        </section>

        <footer class="statusbar">
          <span><i></i> All Systems Operational</span>
          <span>OpenClaw v1.2.0</span>
        </footer>
      </main>
    </div>

    <dialog id="missionDialog">
      <form class="mission-form" id="missionForm" method="dialog">
        <div class="dialog-header">
          <div>
            <p>Create Task</p>
            <h2>Create and assign a task</h2>
          </div>
          <button class="close-button" id="closeDialogButton" type="button" aria-label="Close">Close</button>
        </div>
        <label>
          Task title
          <input name="title" required placeholder="Website Redesign">
        </label>
        <label>
          Description
          <textarea name="description" required rows="4" placeholder="Redesign the marketing website and improve performance."></textarea>
        </label>
        <div class="form-grid">
          <label>
            Project
            <select name="projectId" id="taskProjectSelect"></select>
          </label>
          <label>
            Lane
            <select name="lane">
              <option value="plan">Backlog</option>
              <option value="execute">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </label>
          <label>
            Priority
            <select name="priority">
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
          </label>
          <label>
            Due
            <input name="due" type="date">
          </label>
        </div>
        <fieldset class="agent-picker">
          <legend>Assign agents</legend>
          <div id="dialogAgentList" class="dialog-agent-list"></div>
        </fieldset>
        <div class="form-actions">
          <button class="secondary-button" id="cancelDialogButton" type="button">Cancel</button>
          <button class="create-button compact" type="submit">Create Task</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
